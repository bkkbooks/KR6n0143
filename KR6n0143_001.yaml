body:
  text: 因明入正理論題辭諸法本因曰正理徹諸法本因曰正智理由智顯宗假因明因智為能入正理為所入菩薩證真現量真比量故有真能立真能破以智照理以自悟他故曰因明入正理如立真如則入真如正理立唯識則入唯識正理立無常則入無常正理苟非證真之人則一開口而三十三過隨之立量豈易乎哉譬如禮樂征伐自天子出則諸候拱手聽命而天下治自諸候大夫出則四夷交侵民無所措其手足矣故閲此論者如客兒閲帝王世譜雖知昭穆次序而不能冒神明之胄又如盡識三千律條而身非刑官遂欲加之有罪其誰服之然則學者所急務在證真哉務在證真哉秀水真實居士馮夢禎題
